AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Ad Buyer System — Storage stack.
  ElastiCache Redis for production key-value storage (campaign state,
  negotiation sessions, booking records).

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into
  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet
  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet
  RedisSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ElastiCache Redis
  RedisNodeType:
    Type: String
    Default: cache.t3.micro
    Description: ElastiCache node type
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium
      - cache.r6g.large

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # ElastiCache Redis
  # ---------------------------------------------------------------------------
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Private subnets for Ad Buyer Redis
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub "ad-buyer-${Environment} Redis"
      Engine: redis
      EngineVersion: "7.1"
      CacheNodeType: !Ref RedisNodeType
      NumCacheClusters: 1
      AutomaticFailoverEnabled: false
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroupId
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: false
      Tags:
        - Key: Name
          Value: !Sub "ad-buyer-${Environment}-redis"
        - Key: Project
          Value: ad-buyer-system
        - Key: Environment
          Value: !Ref Environment

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  RedisEndpoint:
    Description: Redis primary endpoint address
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-RedisEndpoint"

  RedisPort:
    Description: Redis primary endpoint port
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-RedisPort"
