AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Ad Buyer System — Root stack orchestrating network, storage, and compute
  resources for a FastAPI application with Redis-backed storage and EFS
  persistence for SQLite fallback.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Deployment environment name.

  TemplatesBucketName:
    Type: String
    Description: S3 bucket containing nested CloudFormation templates.

  TemplatesPrefix:
    Type: String
    Default: ad-buyer-system/cloudformation
    Description: S3 key prefix for nested templates.

  ContainerImage:
    Type: String
    Description: ECR image URI for the ad buyer container (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/ad-buyer:latest).

  CertificateArn:
    Type: String
    Description: ARN of an ACM certificate for the HTTPS listener.

  AnthropicApiKeyParameter:
    Type: String
    Default: /ad-buyer-system/anthropic-api-key
    Description: SSM SecureString parameter name holding the Anthropic API key.

  RedisNodeType:
    Type: String
    Default: cache.t3.micro
    Description: ElastiCache Redis node type.
    AllowedValues:
      - cache.t3.micro
      - cache.t3.small
      - cache.t3.medium
      - cache.r6g.large

Resources:
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.amazonaws.com/${TemplatesPrefix}/network.yaml"
      Parameters:
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: ad-buyer-system
        - Key: Environment
          Value: !Ref Environment

  StorageStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.amazonaws.com/${TemplatesPrefix}/storage.yaml"
      Parameters:
        Environment: !Ref Environment
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        PrivateSubnet1Id: !GetAtt NetworkStack.Outputs.PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt NetworkStack.Outputs.PrivateSubnet2Id
        RedisSecurityGroupId: !GetAtt NetworkStack.Outputs.RedisSecurityGroupId
        RedisNodeType: !Ref RedisNodeType
      Tags:
        - Key: Project
          Value: ad-buyer-system
        - Key: Environment
          Value: !Ref Environment

  ComputeStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: StorageStack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.amazonaws.com/${TemplatesPrefix}/compute.yaml"
      Parameters:
        Environment: !Ref Environment
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        PublicSubnet1Id: !GetAtt NetworkStack.Outputs.PublicSubnet1Id
        PublicSubnet2Id: !GetAtt NetworkStack.Outputs.PublicSubnet2Id
        PrivateSubnet1Id: !GetAtt NetworkStack.Outputs.PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt NetworkStack.Outputs.PrivateSubnet2Id
        AlbSecurityGroupId: !GetAtt NetworkStack.Outputs.AlbSecurityGroupId
        EcsSecurityGroupId: !GetAtt NetworkStack.Outputs.EcsSecurityGroupId
        EfsSecurityGroupId: !GetAtt NetworkStack.Outputs.EfsSecurityGroupId
        RedisEndpoint: !GetAtt StorageStack.Outputs.RedisEndpoint
        RedisPort: !GetAtt StorageStack.Outputs.RedisPort
        ContainerImage: !Ref ContainerImage
        CertificateArn: !Ref CertificateArn
        AnthropicApiKeyParameter: !Ref AnthropicApiKeyParameter
      Tags:
        - Key: Project
          Value: ad-buyer-system
        - Key: Environment
          Value: !Ref Environment

Outputs:
  AlbDnsName:
    Description: DNS name of the Application Load Balancer.
    Value: !GetAtt ComputeStack.Outputs.AlbDnsName

  AlbHostedZoneId:
    Description: Hosted zone ID of the ALB (for Route 53 alias records).
    Value: !GetAtt ComputeStack.Outputs.AlbHostedZoneId

  EcsClusterName:
    Description: Name of the ECS cluster.
    Value: !GetAtt ComputeStack.Outputs.EcsClusterName

  EcsServiceName:
    Description: Name of the ECS service.
    Value: !GetAtt ComputeStack.Outputs.EcsServiceName

  EfsFileSystemId:
    Description: ID of the EFS filesystem used for SQLite persistence.
    Value: !GetAtt ComputeStack.Outputs.EfsFileSystemId

  RedisEndpoint:
    Description: Redis primary endpoint address.
    Value: !GetAtt StorageStack.Outputs.RedisEndpoint

  RedisPort:
    Description: Redis primary endpoint port.
    Value: !GetAtt StorageStack.Outputs.RedisPort
